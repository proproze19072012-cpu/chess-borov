<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessClone - Полнофункциональные шахматы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chesss.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <div class="logo-text"><span class="green">Chess</span>BOROV</div>
        </div>
        <ul class="nav-links">
            <li><a href="chesss.html"><i class="fas fa-chess-board"></i> Играть</a></li>
            <li><a href="learnm.html"><i class="fas fa-graduation-cap"></i> Учиться</a></li>
            <li><a href="watch.html"><i class="fas fa-tv"></i> Смотреть</a></li>
            <li><a href="com.html"><i class="fas fa-users"></i> Сообщество</a></li>
        </ul>
        <div class="nav-buttons">
            <button class="btn btn-login" onclick="window.location.href='login.html'">Войти</button>
            <button class="btn btn-signup" onclick="window.location.href='register.html'">Регистрация</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="left-panel">
            <div class="game-container">
                <div class="game-header">
                    <div class="player-info">
                        <div class="player-avatar">♜</div>
                        <div>
                            <div class="player-name">Чёрные (1800)</div>
                            <div class="player-rating">Рейтинг: 1800</div>
                        </div>
                    </div>
                    
                    <div class="game-status">
                        <div class="status-text" id="gameStatus">Ход белых</div>
                        <div id="checkStatus"></div>
                    </div>
                    <!-- Блок выбора времени -->
<div class="time-control-panel">
    <select id="timeSelect" class="time-select">
        <option value="1">1 минута (Пуля)</option>
        <option value="3">3 минуты (Блиц)</option>
        <option value="5">5 минут (Блиц)</option>
        <option value="10" selected>10 минут (Рапид)</option>
        <option value="15">15 минут (Рапид)</option>
        <option value="30">30 минут (Классика)</option>
        <option value="60">1 час (Классика)</option>
    </select>
    <button class="control-btn" id="startTimerBtn"><i class="fas fa-clock"></i> Старт</button>
</div>

<!-- Таймеры -->
<div class="timers">
    <div class="timer white-timer">
        <span>Белые:</span>
        <span id="whiteTime">10:00</span>
    </div>
    <div class="timer black-timer">
        <span>Чёрные:</span>
        <span id="blackTime">10:00</span>
    </div>
</div>
                    <div class="game-controls">
                        <button class="control-btn" id="undoBtn"><i class="fas fa-undo"></i> Отмена</button>
                        <button class="control-btn" id="drawBtn"><i class="fas fa-handshake"></i> Ничья</button>
                        <button class="control-btn" id="resignBtn"><i class="fas fa-flag"></i> Сдаться</button>
                    </div>
                    
                    <div class="player-info">
                        <div>
                            <div class="player-name">Белые (1650)</div>
                            <div class="player-rating">Рейтинг: 1650</div>
                        </div>
                        <div class="player-avatar">♔</div>
                    </div>
                </div>
                
                <div class="chessboard" id="chessboard"></div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn btn-play" id="newGameBtn"><i class="fas fa-play"></i> Новая игра</button>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="panel-box">
                <div class="panel-title">История ходов</div>
                <div class="moves-history" id="movesHistory"></div>
            </div>
            
            <div class="panel-box">
                <div class="panel-title">Взятые фигуры</div>
                <div>Белые взяли:</div>
                <div class="captured-pieces" id="capturedByWhite"></div>
                <div style="margin-top: 10px;">Чёрные взяли:</div>
                <div class="captured-pieces" id="capturedByBlack"></div>
            </div>
        </div>
    </div>
    
    <footer>
        <div class="footer-links">
            <a href="info.html">О нас</a>
            <a href="help.html">Помощь</a>
        </div>
        <div class="copyright">
            © 2026 ChessClone. 
        </div>
    </footer>

    <script src="chesss.js"></script>
</body>
</html>
