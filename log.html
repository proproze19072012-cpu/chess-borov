<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - ChessClone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            background: #2c2c2c;
            padding: 30px;
            border-radius: 10px;
        }
        .auth-title {
            color: #82b440;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            color: #ddd;
        }
        .form-group input {
            padding: 12px;
            border: 1px solid #444;
            border-radius: 5px;
            background: #1a1a1a;
            color: #fff;
        }
        .auth-btn {
            background: #82b440;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .auth-links {
            margin-top: 20px;
            text-align: center;
            color: #aaa;
        }
        .auth-links a {
            color: #82b440;
            text-decoration: none;
        }
        .error-message {
            color: #ff4444;
            display: none;
        }
    </style>
</head>
<body>

        
    </nav>

    <div class="auth-container">
        <h2 class="auth-title">Вход</h2>
        
        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label>Имя пользователя или Email</label>
                <input type="text" id="loginUsername" required>
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" required>
            </div>
            
            <button type="submit" class="auth-btn">Войти</button>
            
            <div class="error-message" id="loginError"></div>
        </form>
        
        <div class="auth-links">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </div>
    </div>

    <footer>
        <div class="copyright">© 2024 ChessClone</div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let username = document.getElementById('loginUsername').value;
            let password = document.getElementById('loginPassword').value;
            
            let users = JSON.parse(localStorage.getItem('chessUsers') || '[]');
            let user = users.find(u => (u.username === username || u.email === username) && u.password === password);
            
            if (user) {
                localStorage.setItem('chessCurrentUser', user.username);
                window.location.href = 'index.html';
            } else {
                document.getElementById('loginError').textContent = 'Неверное имя или пароль';
                document.getElementById('loginError').style.display = 'block';
            }
        });
    </script>
</body>
</html>
